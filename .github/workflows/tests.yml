name: tests

# Real green/red signal on every PR and every push to main: installs the pinned
# deps on the SAME Python as the runtime image, byte-compiles the app, and runs the
# pytest suite (with coverage) under tests/. This is what makes dependency bumps
# (incl. Dependabot's) verifiable before they land — build.yml only builds/pushes
# the image.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (matches the runtime base image)
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies (runtime + test)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt -r requirements-dev.txt

      - name: Byte-compile the app
        run: python -m compileall -q app

      - name: Run tests (pytest + coverage)
        run: python -m pytest tests/ -q --cov=app --cov-report=term-missing

      - name: Dependency audit (advisory, non-blocking)
        continue-on-error: true
        run: |
          python -m pip install --quiet pip-audit
          pip-audit -r app/requirements.txt
